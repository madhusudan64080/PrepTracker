# Render Blueprint (repo root)
# This keeps Render working even in a monorepo by explicitly targeting `backend/`.
services:
  - type: web
    name: preptrack-api
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    # Render builds with NODE_ENV=production, which makes npm omit devDependencies by default.
    # TypeScript compilation needs @types/* (devDependencies), so we explicitly include them.
    buildCommand: npm ci --include=dev && npm run build
    startCommand: node dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: OPENROUTER_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BULLMQ_PREFIX
        value: preptrack

