version: "3.9"

services:

  mongodb:
    image: mongo:7
    container_name: preptrack-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: preptrack
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: preptrack-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: preptrack-backend
    restart: always
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/preptrack
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: changeme_use_strong_secret
      JWT_ACCESS_SECRET: changeme_access_secret
      JWT_REFRESH_SECRET: changeme_refresh_secret
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-changeme}
      FRONTEND_URL: http://localhost:3000
      BCRYPT_SALT_ROUNDS: "10"
    command: npm run dev
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    image: node:20-alpine
    container_name: preptrack-frontend
    working_dir: /app
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
      NEXT_PUBLIC_WS_URL: http://localhost:5000
      NODE_ENV: development
    command: sh -c "npm install && npm run dev"

volumes:
  mongodb_data:
  redis_data:
